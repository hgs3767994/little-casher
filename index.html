<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小店長收銀機</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f0f0; overflow: hidden; }
        
        #videoContainer {
            position: relative;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 3 / 4; /* 強制維持比例，防止畫面塌陷 */
            display: none;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        #video { 
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓鏡頭畫面填滿容器不留白 */
        }
        
        #scanLine {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 3px;
            background: #ff0000;
            box-shadow: 0 0 12px #ff0000;
            transform: translateY(-50%);
            z-index: 10;
            pointer-events: none;
            /* 加入一點點閃爍動畫，更有真實感 */
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }
        
        #startBtn { padding: 20px 50px; font-size: 1.6rem; background: #4CAF50; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 20; }
        #status { margin-top: 20px; color: #555; text-align: center; padding: 0 20px; font-weight: bold; }
    </style>
  
<meta name="apple-mobile-web-app-title" content="小小收銀機">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>

    <button id="startBtn">🛍️ 開始收銀</button>
    
    <div id="videoContainer">
        <video id="video" autoplay playsinline></video>
        <div id="scanLine"></div>
    </div>
    
    <div id="status">準備好了嗎？</div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('videoContainer');
        const status = document.getElementById('status');
        
        let lastScanTime = 0;
        const cooldown = 2000;

        // 音效合成
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(700, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch(e) { console.error("音效錯誤", e); }
        }

        async function startScanner() {
            status.innerText = "正在啟動鏡頭...";
            
            try {
                // 1. 取得鏡頭權限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                
                video.srcObject = stream;
                
                // 2. 確保影片載入後才顯示容器
                video.onloadedmetadata = () => {
                    video.play();
                    videoContainer.style.display = 'block';
                    startBtn.style.display = 'none';
                    status.innerText = "掃描中...找找看條碼！";
                };

                // 3. 檢查 BarcodeDetector (加入錯誤保護)
                if (!('BarcodeDetector' in window)) {
                    status.innerText = "錯誤：此瀏覽器不支援掃描功能，請用 Android Chrome 開啟。";
                    return;
                }

                // 設定支援的格式 (若要新增，請確保格式名稱正確)
                const formats = ['code_128', 'ean_13', 'ean_8', 'qr_code'];
                const barcodeDetector = new BarcodeDetector({ formats });

                // 4. 啟動循環辨識
                async function tick() {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        try {
                            const barcodes = await barcodeDetector.detect(video);
                            const now = Date.now();
                            if (barcodes.length > 0 && (now - lastScanTime > cooldown)) {
                                playBeep();
                                lastScanTime = now;
                                status.innerText = "嗶！掃到一個商品！";
                                // 震動回饋 (如果手機支援)
                                if (navigator.vibrate) navigator.vibrate(50);
                                setTimeout(() => { status.innerText = "繼續掃描下一個..."; }, 800);
                            }
                        } catch (err) {
                            // 忽略辨識過程中的小錯誤
                        }
                    }
                    requestAnimationFrame(tick);
                }
                tick();

            } catch (err) {
                console.error(err);
                status.innerText = "無法開啟鏡頭。原因：" + err.message;
            }
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startScanner();
        });
    </script>
</body>
</html>
